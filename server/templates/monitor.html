<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Telemetry Monitor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 50px auto; background: #2d2d2d; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; font-weight: 300; }
        .weight-display { font-size: 80px; font-weight: bold; color: #4CAF50; margin: 20px 0; }
        .timestamp { color: #888; font-size: 14px; }
        .status { margin-top: 30px; font-size: 14px; color: #aaa; }
        a.button { display: inline-block; margin-top: 30px; background: #007bff; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; }
        a.button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Live Weight Monitor</h1>
        <div class="weight-display" id="weight">-- g</div>
        <div class="timestamp" id="timestamp">Waiting for data...</div>
        <div class="status" id="status">Connecting...</div>
        <a href="/" class="button">Back to Dashboard</a>
    </div>

    <script>
        function fetchLatestData() {
            fetch('/api/latest_weight')
                .then(response => {
                    if (!response.ok) throw new Error('No data');
                    return response.json();
                })
                .then(data => {
                    document.getElementById('weight').innerText = data.weight_g.toFixed(2) + ' g';
                    document.getElementById('timestamp').innerText = 'Last updated: ' + data.timestamp;
                    document.getElementById('status').innerText = 'Connected';
                    document.getElementById('status').style.color = '#4CAF50';
                })
                .catch(error => {
                    document.getElementById('status').innerText = 'Disconnected / No Data';
                    document.getElementById('status').style.color = '#F44336';
                });
        }
        
        // Poll every 1000ms
        setInterval(fetchLatestData, 1000);
        fetchLatestData();
    </script>
</body>
</html>
